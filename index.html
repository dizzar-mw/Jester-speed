<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Comic Racer</title>

<link href="https://fonts.googleapis.com/css2?family=Bangers&display=swap" rel="stylesheet">
</head>

<body>

<div id="startScreen">
<h1>COMIC RACER</h1>

<input id="playerName" placeholder="Enter your name">

<button onclick="startGame()">START GAME</button>

<p id="greeting"></p>
</div>

<div id="gameUI" class="hidden">

<div class="hud">
<span id="username"></span>
<span>Score: <span id="score">0</span></span>
<span>High Score: <span id="highScore">0</span></span>
</div>

<canvas id="gameCanvas" width="400" height="600"></canvas>

</div>

<script src="game.js"></script>

</body>
</html>
<style>

  body{
background:black;
color:white;
font-family:'Bangers',cursive;
text-align:center;
margin:0;
}

h1{
color:orange;
font-size:60px;
text-shadow:3px 3px purple;
}

.hidden{
display:none;
}

#startScreen{
margin-top:120px;
}

input{
padding:10px;
font-size:18px;
border:3px solid aqua;
background:black;
color:white;
}

button{
padding:12px 30px;
font-size:20px;
background:purple;
border:none;
color:white;
cursor:pointer;
margin-top:15px;
}

button:hover{
background:orange;
}

.hud{
display:flex;
justify-content:space-around;
background:purple;
padding:10px;
font-size:20px;
}

canvas{
background:#111;
border:5px solid aqua;
display:block;
margin:auto;
}
  
</style>
